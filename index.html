<!doctype html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NEVDEV — MyFreela</title>
<meta name="description" content="Painel premium para freelancers gerenciarem projetos, finanças e crescimento." />

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
        colors: {
          ink:   { 950:'#0a0a12', 900:'#0f0f1a', 850:'#141422', 800:'#1a1a2b', 700:'#232336', 600:'#2e2e46' },
          brand: { 400:'#a78bfa', 500:'#8b5cf6', 600:'#7c3aed', 700:'#6d28d9' },
        },
        boxShadow: {
          glow: '0 10px 40px -10px rgba(139,92,246,.45)',
          card: '0 1px 0 rgba(255,255,255,.04) inset, 0 10px 30px -12px rgba(0,0,0,.6)',
        },
      }
    }
  }
</script>

<style>
  html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2e2e46;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#3b3b58}
  .glass{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));backdrop-filter:blur(10px)}
  .grad-brand{background:linear-gradient(135deg,#8b5cf6 0%,#6366f1 50%,#22d3ee 100%)}
  .grad-text{background:linear-gradient(135deg,#c4b5fd,#a5f3fc);-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav-item{transition:all .2s ease}
  .nav-item.active{background:linear-gradient(90deg,rgba(139,92,246,.18),rgba(139,92,246,0));color:#fff}
  .nav-item.active .dot{opacity:1}
  .card{transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease}
  .card:hover{transform:translateY(-2px)}
  .fade-in{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  input,select,textarea{color-scheme:dark}
</style>
</head>

<body class="bg-ink-950 text-slate-100 antialiased selection:bg-brand-600/40">

<!-- =================== LOGIN =================== -->
<div id="login" class="min-h-screen grid place-items-center px-6">
  <div class="w-full max-w-md glass border border-white/5 rounded-3xl p-8 shadow-card fade-in">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-11 h-11 rounded-2xl grad-brand grid place-items-center shadow-glow">
        <span class="font-bold text-lg">N</span>
      </div>
      <div>
        <div class="text-xs uppercase tracking-widest text-slate-400">NEVDEV</div>
        <div class="font-bold text-lg -mt-0.5">MyFreela</div>
      </div>
    </div>
    <h1 class="text-2xl font-bold mb-1">Bem-vindo de volta 👋</h1>
    <p class="text-slate-400 text-sm mb-6">Entre para acessar seu painel.</p>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="text-xs text-slate-400">E-mail</label>
        <input required type="email" id="email" value="nev@freela.dev"
          class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500/50" />
      </div>
      <div>
        <label class="text-xs text-slate-400">Senha</label>
        <input required type="password" id="password" value="demo"
          class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500/50" />
      </div>
      <button class="w-full grad-brand rounded-xl py-3 font-semibold shadow-glow hover:brightness-110 transition">
        Entrar
      </button>
    </form>
    <p class="text-[11px] text-slate-500 mt-6 text-center">Não tem conta? <a href="#" id="registerLink" class="text-brand-400 font-semibold">Criar conta</a></p>
  </div>
</div>

<!-- =================== APP =================== -->
<div id="app" class="hidden min-h-screen lg:grid lg:grid-cols-[260px_1fr]">

  <!-- Sidebar -->
  <aside class="lg:sticky lg:top-0 lg:h-screen border-r border-white/5 bg-ink-900/60 backdrop-blur px-4 py-6 flex lg:flex-col gap-1 overflow-x-auto">
    <div class="flex items-center gap-3 px-2 pb-6 shrink-0">
      <div class="w-10 h-10 rounded-2xl grad-brand grid place-items-center shadow-glow"><span class="font-bold">N</span></div>
      <div class="hidden lg:block">
        <div class="text-[10px] uppercase tracking-widest text-slate-500">NEVDEV</div>
        <div class="font-bold -mt-0.5">MyFreela</div>
      </div>
    </div>

    <nav id="nav" class="flex lg:flex-col gap-1 flex-1"></nav>

    <div class="hidden lg:flex items-center gap-3 mt-6 p-3 rounded-xl bg-ink-800/60 border border-white/5">
      <div class="w-9 h-9 rounded-full grad-brand grid place-items-center text-sm font-bold">N</div>
      <div class="min-w-0">
        <div id="userName" class="text-sm font-semibold truncate">Nev</div>
        <div id="userSubtitle" class="text-[11px] text-slate-400 truncate">Freelancer · Pro</div>
      </div>
      <button onclick="logout()" title="Sair" class="ml-auto text-slate-400 hover:text-white">⎋</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="min-w-0">
    <!-- Topbar -->
    <header class="sticky top-0 z-20 bg-ink-950/80 backdrop-blur border-b border-white/5">
      <div class="px-6 lg:px-10 py-4 grid grid-cols-[minmax(0,1fr)_auto] items-center gap-4">
        <div class="min-w-0">
          <h1 id="pageTitle" class="text-xl lg:text-2xl font-bold truncate">Dashboard</h1>
          <p id="pageSubtitle" class="text-slate-400 text-sm truncate">Sua visão geral hoje.</p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <div class="hidden md:flex items-center gap-2 bg-ink-800 border border-white/5 rounded-xl px-3 py-2">
            <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input id="globalSearch" placeholder="Buscar…" class="bg-transparent focus:outline-none text-sm w-48"/>
          </div>
          <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-ink-800 border border-white/5 hover:bg-ink-700 grid place-items-center" title="Tema">🌗</button>
        </div>
      </div>
    </header>

    <div id="view" class="px-6 lg:px-10 py-8"></div>
  </main>
</div>

<!-- =================== Modal =================== -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm grid place-items-center px-4">
  <div class="w-full max-w-lg glass border border-white/10 rounded-2xl p-6 shadow-card fade-in">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modalTitle" class="text-lg font-bold">Título</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden px-4 py-3 rounded-xl border border-white/10 bg-ink-800 shadow-glow text-sm"></div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const API = (localStorage.getItem('api') || window.location.origin).replace(/\/$/,'');
const $ = (s,r=document)=>r.querySelector(s);
const $$= (s,r=document)=>[...r.querySelectorAll(s)];
const fmtBRL = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate= v => v ? new Date(v).toLocaleDateString('pt-BR') : '—';

const state = { route:'dashboard', projects:[], finance:[], notes:[], dash:{}, search:'' };

/* ============================================================
   API helpers
============================================================ */
async function api(path, opts={}){
  const r = await fetch(API+path, {
    headers:{'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if(!r.ok) throw new Error(await r.text());
  return r.status===204 ? null : r.json();
}
function toast(msg, kind='ok'){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'fixed bottom-6 right-6 z-50 px-4 py-3 rounded-xl border shadow-glow text-sm '+
    (kind==='err' ? 'border-rose-500/40 bg-rose-500/10 text-rose-200' : 'border-emerald-500/30 bg-emerald-500/10 text-emerald-200');
  t.classList.remove('hidden');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.add('hidden'), 2200);
}

/* ============================================================
   Auth
============================================================ */
async function api(path, opts={}){
  const headers = {'Content-Type':'application/json'};
  const token = localStorage.getItem('auth_token');
  if(token) headers['Authorization'] = 'Bearer '+token;
  const r = await fetch(API+path, {
    headers,
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if(!r.ok) throw new Error(await r.text());
  return r.status===204 ? null : r.json();
}

$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  try{
    const res = await api('/auth/login',{method:'POST',body:{email:$('#email').value,password:$('#password').value}});
    localStorage.setItem('auth_token', res.token);
    localStorage.setItem('user', JSON.stringify(res.user));
    boot();
  }catch(err){ toast('Falha no login','err'); }
});
function logout(){ localStorage.removeItem('auth_token'); localStorage.removeItem('user'); location.reload(); }

// Register link -> modal
$('#registerLink').addEventListener('click', e=>{
  e.preventDefault();
  $('#modalTitle').textContent = 'Criar conta';
  $('#modalBody').innerHTML = `
    <form id="regForm" class="space-y-3">
      <div>
        <label class="text-xs text-slate-400">Nome</label>
        <input name="name" required class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-3" />
      </div>
      <div>
        <label class="text-xs text-slate-400">E-mail</label>
        <input name="email" type="email" required class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-3" />
      </div>
      <div>
        <label class="text-xs text-slate-400">Senha</label>
        <input name="password" type="password" required class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-3" />
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-xl border border-white/5">Cancelar</button>
        <button class="grad-brand px-4 py-2 rounded-xl font-semibold">Criar</button>
      </div>
    </form>`;
  openModal();
  $('#regForm').onsubmit = async ev => {
    ev.preventDefault();
    const fd = Object.fromEntries(new FormData(ev.target));
    try{
      const res = await api('/auth/register',{method:'POST',body:fd});
      localStorage.setItem('auth_token', res.token);
      localStorage.setItem('user', JSON.stringify(res.user));
      closeModal(); boot(); toast('Conta criada');
    }catch(err){ toast('Erro ao criar conta','err'); }
  };
});

/* ============================================================
   Navigation
============================================================ */
const ROUTES = [
  {id:'dashboard', label:'Dashboard', icon:'M3 12 12 4l9 8M5 10v10h14V10', sub:'Sua visão geral hoje.'},
  {id:'projects',  label:'Projetos',  icon:'M4 6h16M4 12h16M4 18h10',       sub:'Pipeline de trabalho.'},
  {id:'finance',   label:'Finanças',  icon:'M3 3v18h18M7 15l4-4 3 3 5-6',   sub:'Receitas, despesas e lucro.'},
  {id:'instagram', label:'Instagram', icon:'M4 4h16v16H4z M16 8h.01 M12 8a4 4 0 100 8 4 4 0 000-8', sub:'Analytics rápido do seu perfil.'},
  {id:'notes',     label:'Notas',     icon:'M4 4h12l4 4v12H4z M14 4v6h6',   sub:'Ideias e lembretes.'},
  {id:'reports',   label:'Relatórios',icon:'M8 3h8l4 4v14H4V3h4z M8 13h8 M8 17h5', sub:'Exporte um resumo em PDF.'},
];

function renderNav(){
  $('#nav').innerHTML = ROUTES.map(r=>`
    <button data-route="${r.id}" class="nav-item ${state.route===r.id?'active':''} group flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:text-white hover:bg-white/5 min-w-[140px] lg:min-w-0">
      <span class="dot w-1.5 h-6 rounded-full grad-brand opacity-0 -ml-3 mr-0 hidden lg:block"></span>
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${r.icon}"/></svg>
      <span class="text-sm font-medium">${r.label}</span>
    </button>`).join('');
  $$('#nav [data-route]').forEach(b=>b.onclick=()=>go(b.dataset.route));
}

function go(route){
  state.route = route;
  const meta = ROUTES.find(r=>r.id===route);
  $('#pageTitle').textContent = meta.label;
  $('#pageSubtitle').textContent = meta.sub;
  renderNav();
  render();
}

/* ============================================================
   Data loaders
============================================================ */
async function refresh(){
  const [p,f,n,d] = await Promise.all([
    api('/projects'), api('/finance'), api('/notes'), api('/dashboard'),
  ]);
  state.projects=p; state.finance=f; state.notes=n; state.dash=d;
}

/* ============================================================
   VIEWS
============================================================ */
function render(){
  const v = $('#view');
  v.classList.remove('fade-in'); void v.offsetWidth; v.classList.add('fade-in');
  ({
    dashboard: viewDashboard,
    projects:  viewProjects,
    finance:   viewFinance,
    instagram: viewInstagram,
    notes:     viewNotes,
    reports:   viewReports,
  })[state.route]();
}

/* ---------- Dashboard ---------- */
function metric(label, value, hint, tone='brand'){
  const tones = {
    brand:'from-brand-500/20 to-brand-500/0 text-brand-400',
    emerald:'from-emerald-500/20 to-emerald-500/0 text-emerald-400',
    rose:'from-rose-500/20 to-rose-500/0 text-rose-400',
    sky:'from-sky-500/20 to-sky-500/0 text-sky-400',
  }[tone];
  return `
    <div class="card relative overflow-hidden rounded-2xl border border-white/5 bg-ink-900 p-5 shadow-card">
      <div class="absolute inset-0 bg-gradient-to-br ${tones.split(' ').slice(0,2).join(' ')} pointer-events-none"></div>
      <div class="relative">
        <div class="text-xs uppercase tracking-widest text-slate-400">${label}</div>
        <div class="mt-2 text-2xl font-bold ${tones.split(' ').slice(2).join(' ')}">${value}</div>
        <div class="mt-1 text-xs text-slate-400">${hint}</div>
      </div>
    </div>`;
}

function viewDashboard(){
  const d = state.dash;
  const recent = [...state.finance].slice(-6).reverse();
  $('#view').innerHTML = `
    <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
      ${metric('Faturamento', fmtBRL(d.faturamento), 'Total recebido','emerald')}
      ${metric('Despesas', fmtBRL(d.despesas), 'Custos do período','rose')}
      ${metric('Lucro líquido', fmtBRL(d.lucro), 'Receitas − Despesas','brand')}
      ${metric('Taxa de conversão', (d.taxa_conversao||0)+'%', `${d.concluidos}/${d.projetos_total} projetos`,'sky')}
    </section>

    <section class="grid grid-cols-1 xl:grid-cols-3 gap-4 mt-6">
      <div class="xl:col-span-2 rounded-2xl border border-white/5 bg-ink-900 p-6 shadow-card">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold">Pipeline ativo</h3>
          <button onclick="go('projects')" class="text-xs text-brand-400 hover:text-brand-300">Ver todos →</button>
        </div>
        <div class="space-y-3">
          ${state.projects.filter(p=>p.status!=='concluido').slice(0,5).map(p=>`
            <div class="flex items-center gap-4 p-3 rounded-xl bg-ink-850 border border-white/5">
              <div class="w-9 h-9 rounded-lg grad-brand grid place-items-center text-sm font-bold">${p.client[0]}</div>
              <div class="min-w-0 flex-1">
                <div class="truncate font-medium">${p.name}</div>
                <div class="text-xs text-slate-400 truncate">${p.client} · entrega ${fmtDate(p.deadline)}</div>
              </div>
              <div class="text-right">
                <div class="font-semibold">${fmtBRL(p.value)}</div>
                ${statusPill(p.status)}
              </div>
            </div>`).join('') || `<p class="text-sm text-slate-400">Nenhum projeto ativo.</p>`}
        </div>
      </div>

      <div class="rounded-2xl border border-white/5 bg-ink-900 p-6 shadow-card">
        <h3 class="font-semibold mb-4">Últimas movimentações</h3>
        <div class="space-y-2">
          ${recent.map(t=>`
            <div class="flex items-center justify-between text-sm py-2 border-b border-white/5 last:border-0">
              <div class="min-w-0">
                <div class="truncate">${t.description}</div>
                <div class="text-xs text-slate-500">${fmtDate(t.date)} · ${t.category}</div>
              </div>
              <div class="font-semibold ${t.type==='receita'?'text-emerald-400':'text-rose-400'}">
                ${t.type==='receita'?'+':'−'} ${fmtBRL(t.amount)}
              </div>
            </div>`).join('') || `<p class="text-sm text-slate-400">Sem lançamentos.</p>`}
        </div>
      </div>
    </section>`;
}

/* ---------- Projects (Kanban) ---------- */
function statusPill(s){
  const map = {
    ideia:['bg-sky-500/15 text-sky-300 border-sky-500/20','Ideia'],
    andamento:['bg-amber-500/15 text-amber-300 border-amber-500/20','Andamento'],
    concluido:['bg-emerald-500/15 text-emerald-300 border-emerald-500/20','Concluído'],
  };
  const [cls,label] = map[s]||map.ideia;
  return `<span class="mt-1 inline-block text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full border ${cls}">${label}</span>`;
}

function viewProjects(){
  const cols = [
    ['ideia','Ideia','sky'],
    ['andamento','Em andamento','amber'],
    ['concluido','Concluído','emerald'],
  ];
  const q = state.search.toLowerCase();
  const filtered = state.projects.filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.client.toLowerCase().includes(q));

  $('#view').innerHTML = `
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <div class="flex gap-2 items-center bg-ink-800 border border-white/5 rounded-xl px-3 py-2">
        <input id="projSearch" placeholder="Buscar projeto ou cliente…" class="bg-transparent focus:outline-none text-sm w-64"/>
      </div>
      <button onclick="openProject()" class="grad-brand px-4 py-2 rounded-xl font-semibold shadow-glow hover:brightness-110">+ Novo projeto</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      ${cols.map(([id,label,tone])=>`
        <div class="rounded-2xl border border-white/5 bg-ink-900 p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-${tone}-400"></span>
              <h4 class="font-semibold">${label}</h4>
            </div>
            <span class="text-xs text-slate-400">${filtered.filter(p=>p.status===id).length}</span>
          </div>
          <div class="space-y-3">
            ${filtered.filter(p=>p.status===id).map(p=>`
              <div class="card group rounded-xl border border-white/5 bg-ink-850 p-4 hover:border-brand-500/30">
                <div class="flex items-start justify-between gap-2">
                  <div class="min-w-0">
                    <div class="font-semibold truncate">${p.name}</div>
                    <div class="text-xs text-slate-400 truncate">${p.client}</div>
                  </div>
                  <div class="opacity-0 group-hover:opacity-100 transition flex gap-1">
                    <button title="Editar" onclick='openProject(${JSON.stringify(p)})' class="w-7 h-7 rounded-lg hover:bg-white/5">✎</button>
                    <button title="Excluir" onclick="delProject('${p.id}')" class="w-7 h-7 rounded-lg hover:bg-rose-500/10 text-rose-300">✕</button>
                  </div>
                </div>
                <p class="text-xs text-slate-400 mt-2 line-clamp-2">${p.description||'—'}</p>
                <div class="mt-3 flex items-center justify-between text-xs">
                  <span class="text-slate-400">${fmtDate(p.deadline)}</span>
                  <span class="font-semibold">${fmtBRL(p.value)}</span>
                </div>
                <div class="mt-3 flex gap-1">
                  ${['ideia','andamento','concluido'].map(s=>`
                    <button onclick="moveProject('${p.id}','${s}')"
                      class="text-[10px] px-2 py-1 rounded-md border ${p.status===s?'bg-brand-500/20 border-brand-500/40 text-brand-200':'border-white/5 text-slate-400 hover:text-white'}">${s}</button>
                  `).join('')}
                </div>
              </div>`).join('') || `<p class="text-xs text-slate-500">Nada aqui ainda.</p>`}
          </div>
        </div>`).join('')}
    </div>`;

  $('#projSearch').oninput = e => { state.search = e.target.value; render(); };
  $('#projSearch').value = state.search;
}

function openProject(p={}){
  const isEdit = !!p.id;
  $('#modalTitle').textContent = isEdit ? 'Editar projeto' : 'Novo projeto';
  $('#modalBody').innerHTML = `
    <form id="projForm" class="space-y-3">
      ${field('Nome','name',p.name||'')}
      ${field('Cliente','client',p.client||'')}
      <div class="grid grid-cols-2 gap-3">
        ${field('Valor (R$)','value',p.value||0,'number')}
        ${field('Prazo','deadline',p.deadline||'','date')}
      </div>
      <div>
        <label class="text-xs text-slate-400">Status</label>
        <select name="status" class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-2.5">
          ${['ideia','andamento','concluido'].map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="text-xs text-slate-400">Descrição</label>
        <textarea name="description" rows="3" class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-2.5">${p.description||''}</textarea>
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-xl border border-white/5 hover:bg-white/5">Cancelar</button>
        <button class="grad-brand px-4 py-2 rounded-xl font-semibold">Salvar</button>
      </div>
    </form>`;
  openModal();
  $('#projForm').onsubmit = async e=>{
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    fd.value = parseFloat(fd.value)||0;
    try{
      if(isEdit) await api('/projects/'+p.id,{method:'PUT',body:fd});
      else       await api('/projects',{method:'POST',body:fd});
      closeModal(); await refresh(); render(); toast(isEdit?'Projeto atualizado':'Projeto criado');
    }catch{ toast('Erro ao salvar','err'); }
  };
}
async function moveProject(id,status){
  await api(`/projects/${id}/status?status=${status}`,{method:'PATCH'});
  await refresh(); render();
}
async function delProject(id){
  if(!confirm('Excluir este projeto?')) return;
  await api('/projects/'+id,{method:'DELETE'});
  await refresh(); render(); toast('Projeto excluído');
}

function viewInstagram(){

        <input id="igUser" placeholder="@nevdev" class="flex-1 bg-ink-800 border border-white/5 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500/50"/>
        <button class="grad-brand px-5 rounded-xl font-semibold shadow-glow">Buscar</button>
      </form>
      <div id="igResult" class="mt-6"></div>
    </div>`;
  $('#igForm').onsubmit = async e=>{
    e.preventDefault();

    $('#igResult').innerHTML = `<div class="text-slate-400 text-sm">Buscando…</div>`;
    try{
      const r = await api('/instagram/'+encodeURIComponent(u));
      $('#igResult').innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          ${metric('Seguidores', (r.followers??'—').toLocaleString('pt-BR'),'total','brand')}
          ${metric('Seguindo', (r.following??'—').toLocaleString('pt-BR'),'contas','sky')}
          ${metric('Posts', (r.posts??'—').toLocaleString('pt-BR'),'publicados','emerald')}
          ${metric('Engajamento', (r.engagement??'—')+'%','estimado','rose')}
        </div>
        ${r.raw?`<p class="text-xs text-slate-500 mt-4">${r.raw}</p>`:''}
        <p class="text-[11px] text-slate-500 mt-2">fonte: ${r.source}</p>`;
    }catch{ $('#igResult').innerHTML = `<div class="text-rose-300 text-sm">Não foi possível buscar.</div>`; }
  };
}

function exportPDF(){
  const el = document.getElementById('reportArea');
  html2pdf().set({
    margin:10, filename:`myfreela-${Date.now()}.pdf`,
    image:{type:'jpeg',quality:.95},
    html2canvas:{scale:2, backgroundColor:'#0f0f1a'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
  }).from(el).save();
}

/* ============================================================
   Helpers
============================================================ */
function field(label,name,value='',type='text'){
  return `
    <div>
      <label class="text-xs text-slate-400">${label}</label>
      <input name="${name}" type="${type}" value="${value}" class="mt-1 w-full bg-ink-800 border border-white/5 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500/50" />
    </div>`;
}
function openModal(){ $('#modal').classList.remove('hidden'); }
function closeModal(){ $('#modal').classList.add('hidden'); }
function toggleTheme(){ document.documentElement.classList.toggle('dark'); document.body.classList.toggle('bg-ink-950'); document.body.classList.toggle('bg-slate-50'); }

$('#globalSearch').addEventListener('input', e=>{
  state.search = e.target.value;
  if(state.route==='projects') render();
});

/* ============================================================
   Boot
============================================================ */
async function boot(){
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  renderNav();
  // populate user display from localStorage or /auth/me
  const stored = localStorage.getItem('user');
  if(stored){
    try{ const u = JSON.parse(stored); $('#userName').textContent = u.name; $('#userSubtitle').textContent = u.email; }catch(e){}
  }else{
    try{ const r = await api('/auth/me'); if(r && r.user){ localStorage.setItem('user', JSON.stringify(r.user)); $('#userName').textContent = r.user.name; $('#userSubtitle').textContent = r.user.email; } }
    catch(e){}
  }
  try{ await refresh(); }catch{ toast('Backend offline — inicie app.py','err'); }
  go('dashboard');
}
if(localStorage.getItem('auth_token')) boot();
</script>
